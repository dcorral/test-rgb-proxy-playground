name: E2E

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e-electrs:
    name: E2E (electrs)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout playground
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start services
        run: ./regtest.sh start

      - name: Run E2E test
        run: ./regtest.sh e2e

      - name: Proxy logs (on failure)
        if: failure()
        run: docker compose logs proxy

      - name: Stop services
        if: always()
        run: ./regtest.sh stop

  e2e-esplora:
    name: E2E (esplora)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout playground
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start services
        run: ./regtest.sh start esplora

      - name: Run E2E test
        run: ./regtest.sh e2e esplora

      - name: Proxy logs (on failure)
        if: failure()
        run: docker compose logs proxy

      - name: Stop services
        if: always()
        run: ./regtest.sh stop
